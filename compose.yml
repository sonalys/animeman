services:
  postgres:
    image: postgres:18
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: animeman
      POSTGRES_PASSWORD: animeman
      POSTGRES_DB: animeman
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U animeman -d animeman"]
      interval: 1s     # How often to check
      timeout: 10s      # How long to wait for a response
      retries: 100       # How many failures before giving up
      start_period: 1s # Give DB time to initialize before first check
    # ----------------------

  # This is your Go backend
  api:
    container_name: api
    build: 
      context: backend
      dockerfile: ./deployment/Dockerfile
    develop:
      watch:
        - action: rebuild
          path: ./backend
    depends_on:
      - postgres
      - migrate
    environment:
      - POSTGRES_CONN=postgres://animeman:animeman@postgres:5432/animeman?sslmode=disable
      - LOG_LEVEL=debug
    ports:
      - "8080:8080"
    volumes:
      - ./backend/.config:/etc/app:ro

  migrate:
    image: migrate/migrate
    volumes:
      - ./backend/internal/adapters/postgres/migrations:/migrations:z
    command: -path=/migrations/ -database "postgres://animeman:animeman@postgres:5432/animeman?sslmode=disable" up
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: